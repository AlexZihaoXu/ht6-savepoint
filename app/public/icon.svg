<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="SavePoint">
  <!-- Cozy pixel "save point" star on a soft green field -->
  <rect width="32" height="32" fill="#0a0f0a"/>
  <rect x="2" y="2" width="28" height="28" fill="#141a12"/>
  <!-- ground -->
  <rect x="2" y="24" width="28" height="6" fill="#2f3d28"/>
  <!-- save star (Stardew/Undertale save glow) -->
  <g fill="#7cc46b">
    <rect x="15" y="6"  width="2" height="4"/>
    <rect x="14" y="9"  width="4" height="2"/>
    <rect x="10" y="11" width="12" height="2"/>
    <rect x="12" y="13" width="8"  height="2"/>
    <rect x="11" y="15" width="10" height="2"/>
    <rect x="9"  y="17" width="14" height="2"/>
    <rect x="12" y="19" width="3"  height="3"/>
    <rect x="17" y="19" width="3"  height="3"/>
  </g>
  <!-- highlight -->
  <rect x="15" y="12" width="2" height="2" fill="#bde9ab"/>
</svg>
