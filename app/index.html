<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>SavePoint — canvas</title>
    <link rel="icon" href="/icon.svg" />
    <style>
      @font-face {
        font-family: "PressStart2P";
        src: url("/assets/fonts/PressStart2P.ttf") format("truetype");
        font-display: block;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #14101e;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        touch-action: none;
        user-select: none;
      }
      canvas#game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="game"></canvas></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
