<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>SavePoint — your life autosaves</title>
    <meta
      name="description"
      content="A cozy, Stardew-style journal of your day. The people you meet become pixel characters; your days become a garden."
    />

    <!-- Apply the saved / system light|dark preference before first paint so
         dark-theme users never see a light flash. Mirrors src/lib/theme.ts
         (which stays the runtime source of truth for toggling). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("savepoint-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          var root = document.documentElement;
          root.dataset.theme = t;
          root.classList.toggle("dark", t === "dark");
          root.style.colorScheme = t;
        } catch (e) {
          /* default to the stylesheet's light theme */
        }
      })();
    </script>

    <!-- Reliable top safe-area inset for the immersive header.
         WebKit reports env(safe-area-inset-top) as 0px in PORTRAIT even on
         notch / Dynamic Island iPhones (long-standing Safari bug), so a
         full-screen standalone header ends up sitting under the island.
         Probe the real resolved value; when it comes back ~0 on a standalone
         iPhone, fall back to a Dynamic-Island-sized inset. Exposed as --sat,
         which the wooden header pads by (see components/PixelChrome). -->
    <script>
      (function () {
        function setSafeTop() {
          try {
            var probe = document.createElement("div");
            probe.style.cssText =
              "position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top);visibility:hidden;pointer-events:none;";
            document.documentElement.appendChild(probe);
            var inset = probe.getBoundingClientRect().height;
            probe.remove();
            var standalone =
              (window.matchMedia &&
                window.matchMedia("(display-mode: standalone)").matches) ||
              window.navigator.standalone === true;
            var iphone = /iPhone|iPod/.test(window.navigator.userAgent);
            // env() bug: 0 on a full-screen iPhone that clearly has a top inset.
            if (inset < 20 && standalone && iphone) inset = 59;
            document.documentElement.style.setProperty("--sat", inset + "px");
          } catch (e) {
            /* leave the CSS env() default in place */
          }
        }
        setSafeTop();
        window.addEventListener("load", setSafeTop);
        window.addEventListener("resize", setSafeTop);
        window.addEventListener("orientationchange", setSafeTop);
        if (window.visualViewport)
          window.visualViewport.addEventListener("resize", setSafeTop);
      })();
    </script>

    <!-- PWA / mobile web app -->
    <meta name="color-scheme" content="light dark" />
    <!-- Media-scoped theme-color first: browsers pick the first matching tag,
         and the bare one below is the catch-all fallback. -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0a0f0a"
    />
    <meta name="theme-color" content="#7cc46b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SavePoint" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
