# CI — Backend (FastAPI server)
# Runs only when server/** changes. uv handles Python + deps with a warm cache.
name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: server
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        env:
          # Round-trip repository tests hit the mongo:7 service (test DB is dropped per test).
          SAVEPOINT_MONGO_URI: mongodb://127.0.0.1:27017
        run: uv run pytest
